# Goreleaser config — see https://goreleaser.com
# Test locally:   goreleaser release --snapshot --clean
# Real release:   git tag vX.Y.Z && git push --tags  (GitHub Actions runs the rest)

version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: gwam
    main: .
    binary: gwam
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{ .Version }}

archives:
  - id: gwam
    formats: [tar.gz]
    name_template: 'gwam_{{ .Version }}_{{ .Os }}_{{ .Arch }}'
    files:
      - LICENSE
      - README.md

checksum:
  name_template: 'checksums.txt'

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^chore:'
      - '^test:'

homebrew_casks:
  - name: gwam
    repository:
      owner: garrettcannon
      name: homebrew-tap
      branch: main
      token: '{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}'
    homepage: 'https://github.com/garrettcannon/gwam'
    description: 'A tmux-style terminal multiplexer'
    license: 'MIT'
    # The release tarballs live on releases.githubusercontent.com; this
    # tells `brew audit` they're trusted because they originate from
    # github.com/garrettcannon/gwam.
    url:
      verified: github.com/garrettcannon/gwam
    commit_author:
      name: garrettcannon
      email: me@garrettcannon.dev
    # The binary isn't code-signed, so macOS Gatekeeper quarantines it on
    # download. Strip the quarantine attr post-install so it runs without
    # a "cannot be opened because the developer cannot be verified" prompt.
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/gwam"]
          end
